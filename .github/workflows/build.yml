name: Gerar VLE_Desktop.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install customtkinter matplotlib numpy pandas pyinstaller

      - name: Gerar executável
        run: |
          pyinstaller --onefile --windowed --collect-all customtkinter --icon icone.ico --name "VLE_Desktop" vle_desktop.py

      - name: Publicar executável
        uses: actions/upload-artifact@v4
        with:
          name: VLE_Desktop_Windows
          path: dist/VLE_Desktop.exe
